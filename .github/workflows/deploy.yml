name: 🚀 Deploy AI News Assistant

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 设置权限来允许部署到GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过运行和最新排队之间的运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🏗️ Build H5 version for GitHub Pages
      run: |
        npm run build:h5
        # 创建部署目录
        mkdir -p github-pages
        cp -r dist/build/h5/* github-pages/
        # 创建 .nojekyll 文件来禁用 Jekyll 处理
        touch github-pages/.nojekyll
    
    - name: 📤 Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: github-pages

  # 部署任务（只在主分支推送时运行）
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 
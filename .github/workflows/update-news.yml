  # 每天自动运行
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间早上8点运行（UTC 00:00）
  
  # 手动触发
  workflow_dispatch:
    inputs:
      cleanup_old_data:
        description: '是否清理90天前的旧数据'
        required: false
        default: 'false'
        type: choice
        options:
        - 'true'
        - 'false'
